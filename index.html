<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charles Glascoe</title>
    <style>
      :root {
        --bg-dark: #090a0f;
        --card-bg: rgba(18, 20, 28, 0.75);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --accent-purple: #8B5CF6;
        --accent-glow: rgba(139, 92, 246, 0.35);
        --border-subtle: rgba(139, 92, 246, 0.2);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(1200px circle at top center, rgba(139, 92, 246, 0.08), var(--bg-dark) 40%), var(--bg-dark);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .container {
        max-width: 540px;
        width: 100%;
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        padding: 48px 36px;
        border-radius: 20px;
        border: 1px solid var(--border-subtle);
        box-shadow: 0 16px 50px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(139, 92, 246, 0.1);
        text-align: center;
        animation: cardFadeIn 0.6s ease-out forwards;
      }

      img {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid var(--accent-purple);
        margin-bottom: 24px;
        box-shadow: 0 8px 24px var(--accent-glow);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      img:hover {
        transform: scale(1.04);
        box-shadow: 0 12px 32px rgba(139, 92, 246, 0.5);
      }

      h1 {
        font-size: 32px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #ffffff 60%, var(--accent-purple) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .subtitle {
        color: var(--text-secondary);
        font-size: 16px;
        margin-bottom: 32px;
        line-height: 1.4;
      }

      .section-title {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.8px;
        color: var(--accent-purple);
        margin-top: 24px;
        margin-bottom: 10px;
        font-weight: 600;
        position: relative;
        padding-left: 0;
        text-align: center;
      }

      .section-title::before {
  display: none;
}

      p {
        margin: 5px 0;
        font-size: 15px;
        line-height: 1.5;
        color: var(--text-primary);
        text-align: center;
      }

      .email {
        display: inline-block;
        margin-top: 8px;
        color: var(--accent-purple);
        font-weight: 600;
        text-decoration: none;
        transition: opacity 0.2s ease, transform 0.2s ease;
      }

      .email:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      .socials a {
        display: block;
        color: var(--text-secondary);
        text-decoration: none;
        margin-top: 7px;
        font-size: 15px;
        padding-left: 12px;
        border-left: 2px solid transparent;
        transition: color 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
      }

      .socials a:hover {
        color: var(--accent-purple);
        transform: translateX(4px);
        border-left-color: var(--accent-purple);
      }

      @keyframes cardFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 600px) {
        .container { padding: 36px 24px; border-radius: 16px; }
        img { width: 130px; height: 130px; }
        h1 { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="pfp.png" alt="Charles Glascoe" />
      <h1>Charles Glascoe</h1>
      <p class="subtitle">16 year old bug bounty hunter & red teamer</p>

      <div class="section-title">Experience</div>
      <p>Freelance Security Consultant @ HackerOne</p>
      <p>Content Creator @ YouTube</p>

      <div class="section-title">Certifications</div>
      <p>CRTP, CPTS</p>

      <div class="section-title">Contact</div>
      <a href="mailto:erg0sum@p.me" class="email">erg0sum@p.me</a>

      <div class="section-title">Socials</div>
      <div class="socials">
        <a href="https://www.youtube.com/@ergoproxy-00" target="_blank">YouTube: @ergoproxy-00</a>
        <a href="https://x.com/_erg0sum" target="_blank">X: @_erg0sum</a>
        <a href="https://www.linkedin.com/in/charles-glascoe-jr-949b44340/" target="_blank">LinkedIn: Charles Glascoe Jr</a>
      </div>
    </div>
  </body>
</html>
